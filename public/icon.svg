<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- unit pentagon, pointing up -->
    <path id="pent" d="M0,-1 L0.951,-0.309 L0.588,0.809 L-0.588,0.809 L-0.951,-0.309 Z"/>
  </defs>
  <!-- ball -->
  <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <!-- seams from the centre pentagon out to the edge panels -->
  <g stroke="#0f172a" stroke-width="1.6" stroke-linecap="round">
    <line x1="32" y1="23" x2="32" y2="12"/>
    <line x1="40.56" y1="29.22" x2="51.02" y2="25.82"/>
    <line x1="37.29" y1="39.28" x2="43.76" y2="48.18"/>
    <line x1="26.71" y1="39.28" x2="20.24" y2="48.18"/>
    <line x1="23.44" y1="29.22" x2="12.98" y2="25.82"/>
  </g>
  <!-- coloured panels: blue centre (USA), red + green edges (Canada + Mexico).
       No stroke — a scaled stroke would swamp the fill. -->
  <g>
    <use href="#pent" transform="translate(32,32) scale(9.5)" fill="#2563eb"/>
    <use href="#pent" transform="translate(32,13) rotate(0) scale(5.5)" fill="#dc2626"/>
    <use href="#pent" transform="translate(50.1,26.2) rotate(72) scale(5.5)" fill="#16a34a"/>
    <use href="#pent" transform="translate(42.9,47.6) rotate(144) scale(5.5)" fill="#dc2626"/>
    <use href="#pent" transform="translate(21.1,47.6) rotate(216) scale(5.5)" fill="#16a34a"/>
    <use href="#pent" transform="translate(13.9,26.2) rotate(288) scale(5.5)" fill="#dc2626"/>
  </g>
</svg>
