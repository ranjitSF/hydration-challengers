name: Poll live scores

# Hands-off result polling. The endpoint pulls finished results from ESPN's free
# public scoreboard (no key/cap) and no-ops when nothing needs a result. Guarded
# by CRON_SECRET.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score poll
        run: |
          curl -sS -X POST "https://hydration-challengers.vercel.app/api/cron/poll-scores" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
